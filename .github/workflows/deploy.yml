name: Deploy

on:
  workflow_run:
    workflows: ["CI/CD", "ci-cd", "cd-cd"]
    types:
      - completed
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy To VPS
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_READ_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY GHCR_READ_USERNAME GHCR_READ_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Build image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: latest
          APP_PORT: ${{ secrets.APP_PORT }}
          GHCR_USER: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: IMAGE_NAME,IMAGE_TAG,APP_PORT,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            mkdir -p /root/bayarwoy-fe
            cd /root/bayarwoy-fe

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cat > docker-compose.yml <<EOF
            services:
              bayarwoy-fe:
                image: ${IMAGE_NAME}:${IMAGE_TAG}
                container_name: bayarwoy-fe
                restart: unless-stopped
                ports:
                  - "${APP_PORT}:80"
            EOF

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
